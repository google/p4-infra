name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run daily at midnight to ensure we catch regressions.
    - cron: "0 0 * * *"
  # Allow manual triggering of the workflow.
  # https://docs.github.com/en/actions/managing-workflow-runs-and-deployments/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:

# Cancel any preceding run on the pull request.
concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    strategy:
      # Don't abort other runs when one of them fails, to ease debugging.
      fail-fast: false
      matrix:
        # We only test on the oldest version we want to support and latest.
        # We trust that things also work for versions in the middle.
        os: [ubuntu-22.04, ubuntu-latest]
        bazel_version: [7.x, latest]

    runs-on: ${{ matrix.os }}

    env:
      # This tells Bazelisk (installed as `bazel`) to use specified version.
      # https://github.com/bazelbuild/bazelisk?tab=readme-ov-file#how-does-bazelisk-know-which-bazel-version-to-run
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
      CACHE_KEY: ${{ matrix.os }}_bazel-${{ matrix.bazel_version }}

    steps:
    - uses: actions/checkout@v4

    - name: Mount bazel cache
      uses: actions/cache/restore@v4
      with:
        # See https://docs.bazel.build/versions/master/output_directories.html
        path: "~/.cache/bazel"
        # Create a new cache entry whenever Bazel files change.
        # See https://docs.github.com/en/actions/guides/caching-dependencies-to-speed-up-workflows
        key: ${{ env.CACHE_KEY }}-${{ hashFiles('**/*.bazel*', '**/*.bzl') }}
        restore-keys: |
          ${{ env.CACHE_KEY }}

    - name: Save start time
      run: echo "start_time=$(date +%s)" >> "$GITHUB_ENV"

    - name: Install Clang 18 and libc++
      run: |
        # Add the official LLVM APT repository to ensure Clang 18 and a
        # matching libc++ are available on all Ubuntu versions (22.04 only
        # ships LLVM 14, whose libc++ is too old for some dependencies).
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
        . /etc/os-release
        echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-18 main" \
          | sudo tee /etc/apt/sources.list.d/llvm-18.list
        sudo apt-get update
        sudo apt-get install -y clang-18 libc++-18-dev libc++abi-18-dev
        # Remove stale libc++ headers left behind by the pre-installed
        # libc++-14-dev on ubuntu-22.04 runners. These conflict with the
        # LLVM 18 headers at /usr/lib/llvm-18/include/c++/v1/.
        sudo rm -rf /usr/include/c++/v1
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

    - name: Reconfigure C++ toolchain
      # The Bazel cache may contain a C++ toolchain auto-configured for a
      # different compiler or stdlib. Force re-detection after LLVM install.
      run: bazel sync --configure

    - name: Build
      run: bazel build --verbose_failures --test_output=errors //...

    - name: Test
      run: bazel test --verbose_failures --test_output=errors //...

    - name: Calculate build duration
      # Always calculate the build duration so we can update the cache if needed.
      if: always()
      run: |
        end_time=$(date +%s)
        echo "duration=$(( end_time - start_time ))" >> "$GITHUB_ENV"

    - name: Compress cache
      # Always compress the cache so we can update the cache if needed.
      if: always()
      run: rm -rf $(bazel info repository_cache)

    - name: Save bazel cache
      uses: actions/cache/save@v4
      # Only create a new cache entry if we're on the main branch or the build takes >3mins.
      #
      # NOTE: Even though `always()` evaluates to true, and `true && x == x`,
      # the `always() &&` prefix is not redundant! The call to `always()` has a
      # side effect, which is to override the default behavior of automagically
      # canceling this step if a previous step failed.
      # (Don't blame me, blame GitHub Actions!)
      if: always() && (github.ref_name == 'main' || env.duration > 180)
      with:
        path: "~/.cache/bazel"
        key: ${{ env.CACHE_KEY }}-${{ hashFiles('**/*.bazel*', '**/*.bzl') }}-${{ github.run_id }}
